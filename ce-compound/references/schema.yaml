# Compound Engineering — Solution Doc Frontmatter Schema
# Reference for ce-compound and ce-compound-refresh.
# Loaded on demand at validation time — do not bulk-read at skill start.

# Two tracks (bug vs knowledge) determined by `problem_type`.
# Some `problem_type` values are bug-track, some are knowledge-track.
# Each track has different required fields.

# -------------------------------------------------------------------
# Shared required fields (all docs)
# -------------------------------------------------------------------
shared_required:
  - title
  - date             # YYYY-MM-DD
  - category         # maps to docs/solutions/<category>/ subdir
  - module           # module or area name
  - problem_type     # enum (see below)
  - component        # enum (see below)
  - severity         # enum: critical | high | medium | low

# -------------------------------------------------------------------
# Bug track problem_types (require symptoms/root_cause/resolution_type)
# -------------------------------------------------------------------
bug_track_problem_types:
  - build_error
  - test_failure
  - runtime_error
  - performance_issue
  - database_issue
  - security_issue
  - ui_bug
  - integration_issue
  - logic_error

# Bug-track required (in addition to shared)
bug_track_required:
  - symptoms         # array of strings
  - root_cause       # enum
  - resolution_type  # enum

# -------------------------------------------------------------------
# Knowledge track problem_types (no additional required fields)
# -------------------------------------------------------------------
knowledge_track_problem_types:
  - best_practice
  - documentation_gap
  - workflow_issue
  - developer_experience
  - architecture_pattern
  - design_pattern
  - tooling_decision
  - convention

# Knowledge-track optional
knowledge_track_optional:
  - applies_when     # array of strings

# -------------------------------------------------------------------
# Optional fields (both tracks)
# -------------------------------------------------------------------
optional_fields:
  - related_components  # array of strings
  - tags                # array of lowercase-hyphenated keywords
  - last_updated        # YYYY-MM-DD
  - status              # 'stale' to mark a doc for refresh attention
  - stale_reason        # required when status=stale
  - stale_date          # required when status=stale
  - supersedes          # array of filenames this doc replaces

# Bug-track only
bug_track_optional:
  - rails_version    # X.Y.Z format — kept for backward compat with upstream

# -------------------------------------------------------------------
# Category mapping (problem_type -> directory)
# -------------------------------------------------------------------
category_mapping:
  build_error:         docs/solutions/build-errors/
  test_failure:        docs/solutions/test-failures/
  runtime_error:       docs/solutions/runtime-errors/
  performance_issue:   docs/solutions/performance-issues/
  database_issue:      docs/solutions/database-issues/
  security_issue:      docs/solutions/security-issues/
  ui_bug:              docs/solutions/ui-bugs/
  integration_issue:   docs/solutions/integration-issues/
  logic_error:         docs/solutions/logic-errors/
  developer_experience: docs/solutions/developer-experience/
  workflow_issue:      docs/solutions/workflow-issues/
  best_practice:       docs/solutions/best-practices/
  documentation_gap:   docs/solutions/documentation-gaps/
  architecture_pattern: docs/solutions/architecture-patterns/
  design_pattern:      docs/solutions/design-patterns/
  tooling_decision:    docs/solutions/tooling-decisions/
  convention:          docs/solutions/conventions/

# -------------------------------------------------------------------
# Validation rules (apply to all solution docs)
# -------------------------------------------------------------------
validation:
  - "Track determined from problem_type via the tables above."
  - "All shared_required fields must be present."
  - "Bug-track required fields (symptoms, root_cause, resolution_type) must be present on bug-track docs."
  - "Knowledge-track docs have no additional required fields."
  - "Bug-track fields on existing knowledge-track docs are harmless (backward compatibility)."
  - "Enum fields must match the allowed values exactly."
  - "Array fields must respect min/max item counts."
  - "date must match YYYY-MM-DD."
  - "rails_version, if present, must match X.Y.Z and only applies to bug-track docs."

# -------------------------------------------------------------------
# Backward compatibility note
# -------------------------------------------------------------------
backward_compatibility: |
  Docs created before the track system may have symptoms/root_cause/resolution_type
  on knowledge-type problem_types. These are valid legacy docs:
  - Bug-track fields present on a knowledge-track doc are harmless. Do not strip
    them during refresh unless the doc is being rewritten for other reasons.
  - When creating NEW docs, follow the track rules above.
